<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found || Stackly FinTech</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px; }
    .error-num { font-family:var(--font-heading); font-size:clamp(6rem,15vw,12rem); font-weight:900; line-height:1; background:linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; animation:pulse-glow 3s infinite; }
    .error-icon { font-size:4rem; margin-bottom:24px; animation:float 4s ease-in-out infinite; }
    .error-links { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-top:32px; }
  </style>
</head>
<body>
  <div class="hero-bg" style="position:fixed; inset:0; z-index:-1;"></div>
  <div class="hero-grid" style="position:fixed; inset:0; z-index:-1;"></div>

  <a href="index.html" class="nav-logo" style="position:absolute; top:24px; left:32px; font-size:1.3rem;"><img src="assets/images/stackly-logo.webp" alt="Stackly" style="width:32px;height:32px;border-radius:8px;"><span>Stackly</span></a>

  <div class="error-icon">🚧</div>
  <div class="error-num">404</div>
  <h2 style="margin-top:16px; margin-bottom:12px;">Page Not Found</h2>
  <p style="max-width:460px; font-size:1rem; margin-bottom:8px;">Oops! The page you're looking for doesn't exist or is still under construction. Don't worry — let's get you back on track.</p>
  <div class="error-links">
    <a href="index.html" class="btn btn-primary btn-lg">← Back to Home</a>
    <a href="contact.html" class="btn btn-outline btn-lg">Contact Support</a>
  </div>
  <div style="margin-top:48px; display:flex; gap:32px; flex-wrap:wrap; justify-content:center;">
    <a href="services.html" style="font-size:0.9rem; color:var(--primary-light);">Explore Services</a>
    <a href="blog.html" style="font-size:0.9rem; color:var(--primary-light);">Read Blog</a>
    <a href="login.html" style="font-size:0.9rem; color:var(--primary-light);">Login</a>
    <a href="register.html" style="font-size:0.9rem; color:var(--primary-light);">Register</a>
  </div>
</body>
</html>
